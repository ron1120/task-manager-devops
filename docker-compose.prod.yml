# Production / EC2 overrides
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  backend:
    environment:
      CORS_ORIGINS: "http://${EIP}:3000,http://${EIP},http://localhost:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://${EIP}:8000"
