# Production / EC2 overrides
#   export EIP=your.elastic.ip
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  backend:
    environment:
      CORS_ORIGINS: "http://${EIP}:3000,http://${EIP},http://localhost:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://${EIP}:8000"

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3001:3000" # 3000 is already frontend
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Scraped by Prometheus on the Docker network (no public port / SG needed)
  node-exporter:
    image: prom/node-exporter:v1.8.2
    pid: host
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"

volumes:
  prometheus_data:
  grafana_data:
